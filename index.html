<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AOTD</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%23E85830'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #E85830;
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
      padding: 80px 48px;
      /* Warm gradient shift — not perfectly flat */
      background-image:
        radial-gradient(ellipse at 30% 20%, rgba(255,255,255,0.04) 0%, transparent 70%),
        radial-gradient(ellipse at 70% 80%, rgba(0,0,0,0.06) 0%, transparent 70%),
        linear-gradient(170deg, #eb5e35 0%, #E85830 40%, #d9502a 100%);
    }

    /* Noise grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.35;
      mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    .gallery-wall {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ── Row composition ── */
    .g-row {
      display: flex;
      align-items: flex-end;
      margin-bottom: 80px;
    }

    /* ── Single piece (artwork + wall label) ── */
    .g-piece {
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: flex-end;
      gap: 14px;
      flex-shrink: 0;
    }

    .g-art-wrap {
      flex: 1;
      min-width: 0;
    }

    /* The artwork */
    .g-art {
      display: block;
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      /* Contact shadow (tight, dark — where object meets wall) */
      /* Cast shadow (soft, offset down-right — light from upper-left) */
      box-shadow:
        0 1px 1px rgba(0,0,0,0.2),
        2px 4px 6px rgba(0,0,0,0.18),
        4px 10px 20px rgba(0,0,0,0.14),
        6px 16px 40px rgba(0,0,0,0.08);
      transition: box-shadow 0.4s, transform 0.4s;
    }
    .g-piece:hover .g-art {
      /* Lifts slightly off the wall */
      transform: translateY(-2px);
      box-shadow:
        0 2px 2px rgba(0,0,0,0.15),
        3px 6px 10px rgba(0,0,0,0.18),
        6px 14px 28px rgba(0,0,0,0.14),
        8px 24px 56px rgba(0,0,0,0.1);
    }

    /* ── Museum wall label ── */
    .g-label {
      flex-shrink: 0;
      width: 140px;
      max-width: 140px;
      background: #fff;
      padding: 10px 12px;
      box-shadow:
        0 1px 1px rgba(0,0,0,0.15),
        1px 2px 4px rgba(0,0,0,0.12),
        2px 5px 12px rgba(0,0,0,0.08);
      border-radius: 1px;
    }
    .g-label-artist {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      color: #333;
      line-height: 1.4;
    }
    .g-label-title {
      font-size: 0.65rem;
      font-weight: 300;
      font-style: italic;
      color: #333;
      line-height: 1.4;
    }
    .g-label-date {
      font-size: 0.6rem;
      font-weight: 300;
      color: #999;
      margin-top: 3px;
      line-height: 1.4;
    }
    .g-label-medium {
      font-size: 0.55rem;
      font-weight: 300;
      color: #bbb;
      line-height: 1.4;
    }

    @media (max-width: 768px) {
      body { padding: 40px 16px; }
      .g-row {
        flex-wrap: wrap;
        gap: 40px;
        margin-bottom: 40px;
      }
      .g-piece {
        flex-direction: column;
        align-items: flex-start;
        margin-left: 0 !important;
        margin-right: 0 !important;
      }
      .g-label {
        width: auto;
        max-width: none;
      }
      /* Alternate sizes on mobile: ~60% and ~36% */
      .g-row .g-piece:only-child { width: 75% !important; }
      .g-row .g-piece:first-child:not(:only-child) { width: 58% !important; }
      .g-row .g-piece:nth-child(2) { width: 34% !important; }
      .g-row .g-piece:nth-child(3) { width: 45% !important; }
    }
  </style>
</head>
<body>
  <div class="gallery-wall" id="wall"></div>

  <script>
    function slug(t) { return t.url.replace(/.*universalmusiclink\//, '').replace(/\/$/, '') + '/'; }
    function full(t) { return t.image; }
    function fmtDate(t) {
      var d = new Date(t.date + 'T00:00:00');
      return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    }

    fetch('featured.json')
      .then(function (r) { return r.json(); })
      .then(function (data) {
        var list = data.schedule || [];
        list.sort(function (a, b) { return b.date.localeCompare(a.date); });

        var wall = document.getElementById('wall');

        /*
          Layout patterns — hand-composed rows.
          Each pattern defines pieces with:
            w     = width as % of container
            ml/mr = left/right margin as % (for spacing & asymmetry)
            align = 'top' or 'bottom' (vertical alignment within row)
        */
        var patterns = [
          // 1 large piece, pushed left
          [
            { w: 55, ml: 0, mr: 0 }
          ],
          // 2 pieces: small left, medium right with gap
          [
            { w: 25, ml: 4, mr: 0 },
            { w: 38, ml: 12, mr: 0 }
          ],
          // 1 wide piece, centered
          [
            { w: 48, ml: 26, mr: 0 }
          ],
          // 3 pieces: small, small, medium — spread across
          [
            { w: 20, ml: 0, mr: 0 },
            { w: 22, ml: 6, mr: 0 },
            { w: 32, ml: 8, mr: 0 }
          ],
          // 1 large piece, pushed right
          [
            { w: 50, ml: 40, mr: 0 }
          ],
          // 2 pieces: medium left, small right
          [
            { w: 36, ml: 0, mr: 0 },
            { w: 22, ml: 16, mr: 0 }
          ],
        ];

        var idx = 0;
        var patIdx = 0;

        while (idx < list.length) {
          var pat = patterns[patIdx % patterns.length];
          var row = document.createElement('div');
          row.className = 'g-row';

          for (var s = 0; s < pat.sizes_count && idx < list.length; s++) {
            // handled below
          }

          // Build each piece in this row's pattern
          var piecesInRow = Math.min(pat.length, list.length - idx);
          for (var p = 0; p < piecesInRow; p++) {
            var spec = pat[p];
            var t = list[idx];
            idx++;

            var piece = document.createElement('a');
            piece.href = slug(t);
            piece.className = 'g-piece';
            piece.style.width = spec.w + '%';
            if (spec.ml) piece.style.marginLeft = spec.ml + '%';
            if (spec.mr) piece.style.marginRight = spec.mr + '%';

            piece.innerHTML =
              '<div class="g-art-wrap"><img class="g-art" src="' + full(t) + '" alt="' + t.artist + ' – ' + t.title + '" loading="lazy"></div>'
              + '<div class="g-label">'
              +   '<div class="g-label-artist">' + t.artist + '</div>'
              +   '<div class="g-label-title">' + t.title + '</div>'
              +   '<div class="g-label-date">' + (t.year || '') + '</div>'
              +   '<div class="g-label-medium">Featured ' + fmtDate(t) + '</div>'
              + '</div>';

            row.appendChild(piece);
          }

          wall.appendChild(row);
          patIdx++;
        }
      });
  </script>
</body>
</html>
